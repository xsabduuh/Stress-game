<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🌹 Bloom for you · romantic rose</title>
  <style>
    /* ----- global reset & romantic background ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #2d1b3a, #0f0c1b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
      padding: 16px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 680px;
      width: 100%;
    }

    /* canvas: soft glow container, responsive */
    .canvas-wrapper {
      position: relative;
      width: 100%;
      border-radius: 48px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 140, 200, 0.3);
      background: transparent;
      display: flex;
      justify-content: center;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 36px;
      background: transparent; /* background drawn in canvas */
      cursor: default;
      -webkit-tap-highlight-color: transparent;
    }

    /* romantic message — hidden until bloom finishes */
    .love-message {
      margin-top: 24px;
      font-size: clamp(1.8rem, 8vw, 2.6rem);
      font-weight: 500;
      letter-spacing: 2px;
      text-align: center;
      color: #ffe4f2;
      text-shadow: 0 0 12px #ff99cc, 0 0 25px #b57edc;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 1.2s ease, transform 1s ease;
      pointer-events: none;
      backdrop-filter: blur(2px);
      padding: 0 8px;
    }

    .love-message.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* tiny footer / sparkle hint — just for atmosphere */
    .hint {
      margin-top: 8px;
      color: #b8a2d4;
      font-size: 0.8rem;
      opacity: 0.7;
    }

    /* no external libs — pure love */
  </style>
</head>
<body>
<div class="card">
  <div class="canvas-wrapper">
    <canvas id="romanticCanvas" width="600" height="800"></canvas>
  </div>
  <div id="messageBox" class="love-message">This rose is for you ❤️</div>
  <div class="hint">✨ softly glowing · made with code ✨</div>
</div>

<script>
  (function(){
    "use strict";

    // ----- CANVAS & CONTEXT -----
    const canvas = document.getElementById('romanticCanvas');
    const ctx = canvas.getContext('2d');
    const messageEl = document.getElementById('messageBox');
    
    // fixed logical resolution (600x800) — looks crisp and fits mobile
    const CW = 600;            // width
    const CH = 800;            // height
    canvas.width = CW;
    canvas.height = CH;

    // ----- ANIMATION TIMELINE (3–6 sec total, we pick ~5.2s) -----
    const ANIM_DURATION = 5200;        // milliseconds (5.2s)
    let animStart = null;
    let animFrame = null;
    let bloomCompleted = false;         // to show message once

    // ----- GROWTH PARAMETERS (stem, leaves, bloom) -----
    const potY = 700;                  // where the pot sits (bottom area)
    const stemBaseX = 300;             // center X
    const stemBaseY = potY - 8;        // stem starts inside pot
    const flowerCenterY = 340;         // where rose blooms (after full growth)
    const maxStemLength = stemBaseY - flowerCenterY; // ≈ 352px

    // leaf positions (relative to stem progress)
    const leaves = [
      { stemPos: 0.45, size: 1.0, angleOffset: -0.4, delayFactor: 0.0 },  // left leaf
      { stemPos: 0.65, size: 0.9, angleOffset: 0.5, delayFactor: 0.15 }, // right leaf
      { stemPos: 0.80, size: 0.8, angleOffset: -0.2, delayFactor: 0.3 }  // upper left
    ];

    // ----- PARTICLE SYSTEMS (hearts + sparkles) -----
    let particles = [];
    const MAX_PARTICLES = 48;
    const HEART_COLORS = ['#ffb3d9', '#ff99cc', '#ffcce0', '#f8b0d4', '#ffa6c9'];
    const SPARKLE_COLORS = ['#fff9e6', '#ffe6f0', '#ffffff', '#fce4ec'];

    // ----- helper: heart shape (scaled) -----
    function drawHeart(ctx, x, y, size, color, opacity = 1) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(size, size);
      ctx.beginPath();
      ctx.moveTo(0, 0.3);
      ctx.bezierCurveTo(-0.2, -0.1, -0.9, -0.2, -0.9, 0.5);
      ctx.bezierCurveTo(-0.9, 1.0, -0.4, 1.2, 0, 1.6);
      ctx.bezierCurveTo(0.4, 1.2, 0.9, 1.0, 0.9, 0.5);
      ctx.bezierCurveTo(0.9, -0.2, 0.2, -0.1, 0, 0.3);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.globalAlpha = opacity;
      ctx.fill();
      ctx.restore();
    }

    // ----- particle factory -----
    function spawnHeart() {
      if (particles.length > MAX_PARTICLES) return;
      const baseX = stemBaseX + (Math.random() - 0.5) * 180;
      const baseY = flowerCenterY - 20 + Math.random() * 120;
      particles.push({
        type: 'heart',
        x: baseX,
        y: baseY,
        vx: (Math.random() - 0.5) * 0.25,
        vy: -0.6 - Math.random() * 0.7,
        size: 0.5 + Math.random() * 0.9,
        color: HEART_COLORS[Math.floor(Math.random() * HEART_COLORS.length)],
        opacity: 0.8 + Math.random() * 0.3,
        life: 1.0,
        fade: 0.005 + Math.random() * 0.01,
        rotation: 0
      });
    }

    function spawnSparkle() {
      if (particles.length > MAX_PARTICLES) return;
      const angle = Math.random() * Math.PI * 2;
      const radius = 35 + Math.random() * 90;
      const centerX = stemBaseX;
      const centerY = flowerCenterY - 10;
      particles.push({
        type: 'sparkle',
        x: centerX + Math.cos(angle) * radius,
        y: centerY + Math.sin(angle) * radius * 0.8,
        vx: (Math.random() - 0.5) * 0.2,
        vy: -0.1 - Math.random() * 0.5,
        size: 2 + Math.random() * 6,
        color: SPARKLE_COLORS[Math.floor(Math.random() * SPARKLE_COLORS.length)],
        opacity: 0.9,
        life: 0.8 + Math.random() * 0.5,
        fade: 0.008,
        twinkle: Math.random() * 0.1
      });
    }

    // ----- update particles (hearts rise, sparkles twinkle) -----
    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        
        if (p.type === 'heart') {
          p.vy += 0.008; // slight floatiness
          p.life -= p.fade;
        } else {
          // sparkle: slow fade and random twinkle
          p.life -= p.fade;
          p.opacity = 0.6 + 0.4 * Math.sin(Date.now() * 0.01 + i);
        }
        
        // remove if faded or off-canvas (with margin)
        if (p.life <= 0.02 || p.y < -50 || p.x < -50 || p.x > CW + 50) {
          particles.splice(i, 1);
          continue;
        }
        
        // tiny boundary bounce for sparkles (optional)
        if (p.type === 'sparkle' && (p.x < 10 || p.x > CW - 10)) {
          p.vx *= -0.3;
        }
      }

      // continuously generate hearts and sparkles (romantic atmosphere)
      if (Math.random() < 0.3) spawnHeart();
      if (Math.random() < 0.4) spawnSparkle();
    }

    // ----- draw particles (hearts & sparkles) -----
    function drawParticles() {
      for (let p of particles) {
        ctx.save();
        if (p.type === 'heart') {
          drawHeart(ctx, p.x, p.y, p.size * 0.7, p.color, p.opacity * p.life);
        } else { // sparkle
          ctx.globalAlpha = p.opacity * p.life;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.shadowColor = '#fff9e6';
          ctx.shadowBlur = 12;
          ctx.fill();
          // extra tiny sparkle cross
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(p.x-1, p.y-1, p.size*0.2, 0, Math.PI*2);
          ctx.fillStyle = '#fff';
          ctx.fill();
        }
        ctx.restore();
      }
      // reset shadow (important)
      ctx.shadowBlur = 0;
      ctx.shadowColor = 'transparent';
    }

    // ----- DRAW FLOWER POT (ground / soil) -----
    function drawPot() {
      // pot body (warm terracotta)
      ctx.save();
      ctx.shadowColor = '#3d1e2e';
      ctx.shadowBlur = 14;
      ctx.shadowOffsetY = 3;
      
      // main pot shape
      ctx.beginPath();
      ctx.moveTo(230, potY);
      ctx.lineTo(370, potY);
      ctx.lineTo(350, potY + 45);
      ctx.lineTo(250, potY + 45);
      ctx.closePath();
      const potGrad = ctx.createLinearGradient(260, potY, 340, potY+45);
      potGrad.addColorStop(0, '#9f5e4b');
      potGrad.addColorStop(1, '#6d3f32');
      ctx.fillStyle = potGrad;
      ctx.fill();
      
      // pot rim
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.ellipse(300, potY-2, 82, 18, 0, 0, Math.PI*2);
      ctx.fillStyle = '#b5725e';
      ctx.fill();
      
      // soil / ground inside
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.ellipse(300, potY-6, 68, 12, 0, 0, Math.PI*2);
      ctx.fillStyle = '#4a2c23';
      ctx.fill();
      
      // little highlights
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.ellipse(280, potY-10, 20, 5, 0, 0, Math.PI*2);
      ctx.fillStyle = '#6d4c3d';
      ctx.globalAlpha = 0.4;
      ctx.fill();
      
      ctx.restore();
    }

    // ----- DRAW STEM (animated length) + LEAVES (one by one) -----
    function drawStemAndLeaves(progress) {
      // stem progress: 0→1 (but we want stem fully grown before leaves start, but we control via timeline)
      const stemGrow = Math.min(progress / 0.35, 1.0);  // stem reaches full at ~35% of total anim
      const currentStemY = stemBaseY - (maxStemLength * stemGrow);
      
      // draw stem (smooth curve)
      ctx.save();
      ctx.shadowColor = '#b8f0ae';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.moveTo(stemBaseX, stemBaseY);
      ctx.lineTo(stemBaseX, currentStemY);
      ctx.lineWidth = 6 + 2 * Math.sin(progress * 8) * 0.3; // subtle organic
      ctx.strokeStyle = '#3f7840';
      ctx.lineCap = 'round';
      ctx.stroke();
      
      // second lighter highlight
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.moveTo(stemBaseX-1.5, stemBaseY);
      ctx.lineTo(stemBaseX-1.5, currentStemY);
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#6da86d';
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();

      // leaves appear gradually (one by one) based on leaf progress thresholds
      const leafStartProgress = 0.28;  // when first leaf can start
      const leafEndProgress = 0.55;    // all leaves fully visible by 55%
      
      leaves.forEach((leaf, index) => {
        // each leaf appears with its own delay
        const leafDelay = leaf.delayFactor;
        let leafAlpha = 0;
        if (progress > leafStartProgress) {
          const leafRange = leafEndProgress - leafStartProgress;
          const leafProgress = Math.min(Math.max((progress - leafStartProgress - leafDelay) / (leafRange * 0.5), 0), 1.0);
          leafAlpha = Math.min(leafProgress * 1.5, 1.0);
        }
        if (leafAlpha <= 0.02) return;
        
        // position on stem (interpolate)
        const stemYAtLeaf = stemBaseY - (maxStemLength * Math.min(leaf.stemPos, stemGrow));
        const leafXOffset = (index % 2 === 0 ? -1 : 1) * (18 + leaf.size * 12);
        
        ctx.save();
        ctx.translate(stemBaseX + leafXOffset * 0.7, stemYAtLeaf - 3);
        ctx.rotate((leaf.angleOffset + (index * 0.2)) * (0.7 + 0.3 * leafAlpha));
        ctx.globalAlpha = leafAlpha * 0.95;
        ctx.shadowColor = '#3f7a3f';
        ctx.shadowBlur = 10;
        
        // draw leaf (simple teardrop)
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(15 * leaf.size, -20 * leaf.size, 5 * leaf.size, -38 * leaf.size);
        ctx.quadraticCurveTo(-8 * leaf.size, -24 * leaf.size, 0, 0);
        const leafGrad = ctx.createLinearGradient(-5, -5, 12, -30);
        leafGrad.addColorStop(0, '#51843d');
        leafGrad.addColorStop(1, '#2c6b2c');
        ctx.fillStyle = leafGrad;
        ctx.fill();
        ctx.strokeStyle = '#235a23';
        ctx.lineWidth = 1.2;
        ctx.stroke();
        
        // leaf vein
        ctx.globalAlpha = leafAlpha * 0.6;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(2, -22 * leaf.size);
        ctx.strokeStyle = '#b3d9a0';
        ctx.lineWidth = 1.0;
        ctx.stroke();
        ctx.restore();
      });
    }

    // ----- ROSE BLOOM (petals opening) based on bloom factor (0→1) -----
    function drawRose(bloom) {
      // bloom: 0 = bud, 1 = fully open
      const centerX = stemBaseX;
      const centerY = flowerCenterY;
      
      // soft glow around flower (intensifies with bloom)
      ctx.save();
      const glowRadius = 40 + 50 * bloom;
      const gradient = ctx.createRadialGradient(centerX-5, centerY-8, 5, centerX, centerY, glowRadius);
      gradient.addColorStop(0, '#ffd0e8');
      gradient.addColorStop(0.5, '#f2a7c9');
      gradient.addColorStop(1, 'transparent');
      ctx.globalAlpha = 0.45 + 0.25 * bloom;
      ctx.fillStyle = gradient;
      ctx.shadowColor = '#ffb3d9';
      ctx.shadowBlur = 35;
      ctx.beginPath();
      ctx.arc(centerX, centerY, glowRadius, 0, Math.PI*2);
      ctx.fill();
      
      ctx.shadowBlur = 20;
      ctx.globalAlpha = 0.9;
      
      // draw petals (layered, rotating & scaling with bloom)
      const petalCount = 8;
      const basePetalScale = 0.6 + bloom * 1.1;
      const petalAngleOffset = bloom * 0.9;
      
      for (let i = 0; i < petalCount; i++) {
        const angle = (i / petalCount) * Math.PI * 2 + petalAngleOffset;
        const petalOpen = 0.4 + bloom * 1.3;  // spread factor
        const dist = 7 + 22 * bloom;
        const petalX = centerX + Math.cos(angle) * dist;
        const petalY = centerY + Math.sin(angle) * dist * 0.8 - 2;
        
        ctx.save();
        ctx.translate(petalX, petalY);
        ctx.rotate(angle + 0.3);
        ctx.scale(basePetalScale * (0.8 + 0.2 * Math.sin(i*1.5)), basePetalScale * 0.9);
        
        // petal shape (soft rounded)
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(16, -28, 6, -46);
        ctx.quadraticCurveTo(-10, -30, 0, 0);
        
        const petalGrad = ctx.createLinearGradient(-5, -10, 8, -35);
        petalGrad.addColorStop(0, '#ff8fb4');
        petalGrad.addColorStop(0.7, '#d94f8a');
        ctx.fillStyle = petalGrad;
        ctx.shadowColor = '#ff99bb';
        ctx.shadowBlur = 16;
        ctx.fill();
        ctx.strokeStyle = '#b33b6e';
        ctx.lineWidth = 1.0;
        ctx.stroke();
        ctx.restore();
      }
      
      // inner petals / bud center (more compact)
      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 + bloom * 1.2;
        const innerDist = 3 + 10 * bloom;
        const ix = centerX + Math.cos(angle) * innerDist;
        const iy = centerY + Math.sin(angle) * innerDist * 0.7 - 3;
        
        ctx.save();
        ctx.translate(ix, iy);
        ctx.rotate(angle + 0.7);
        ctx.scale(0.7 + bloom * 0.7, 0.6 + bloom * 0.5);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(10, -18, 4, -28);
        ctx.quadraticCurveTo(-6, -18, 0, 0);
        ctx.fillStyle = '#f774a5';
        ctx.shadowBlur = 14;
        ctx.fill();
        ctx.restore();
      }
      
      // center bud (golden/pink)
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.arc(centerX-1, centerY-2, 8 + 4 * bloom, 0, 2*Math.PI);
      const centerGrad = ctx.createRadialGradient(centerX-3, centerY-5, 2, centerX, centerY, 14);
      centerGrad.addColorStop(0, '#fdd0e0');
      centerGrad.addColorStop(1, '#e6739f');
      ctx.fillStyle = centerGrad;
      ctx.fill();
      
      ctx.restore();
    }

    // ----- draw background (soft gradient) -----
    function drawBackground() {
      const grad = ctx.createRadialGradient(200, 300, 100, 400, 500, 800);
      grad.addColorStop(0, '#271a33');
      grad.addColorStop(0.5, '#1e1428');
      grad.addColorStop(1, '#0b0812');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, CW, CH);
      
      // subtle vignette
      ctx.save();
      ctx.globalCompositeOperation = 'overlay';
      const vignette = ctx.createRadialGradient(300, 400, 150, 300, 400, 500);
      vignette.addColorStop(0, 'transparent');
      vignette.addColorStop(1, '#180e1f');
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, CW, CH);
      ctx.restore();
    }

    // ----- MAIN DRAW (called each frame) -----
    function drawScene(progress) {
      // progress clamped 0..1
      const p = Math.min(progress, 1.0);
      
      // clear and draw bg
      drawBackground();
      
      // draw pot (always visible)
      drawPot();
      
      // stem and leaves
      drawStemAndLeaves(p);
      
      // bloom factor: petals start opening around 0.45, fully open at 1.0
      let bloomFactor = 0;
      if (p > 0.42) {
        bloomFactor = Math.min((p - 0.42) / 0.58, 1.0);
      }
      // draw rose (with bloom)
      drawRose(bloomFactor);
      
      // particles (hearts, sparkles) on top
      drawParticles();
      
      // extra romantic floating effect: tiny glints
      if (p > 0.2) {
        ctx.save();
        ctx.shadowBlur = 15;
        for (let i=0; i<3; i++) {
          const flicker = Math.sin(Date.now()*0.01 + i)*0.5+0.5;
          ctx.beginPath();
          ctx.arc(480 + i*30, 200 + i*40, 2 + flicker*3, 0, Math.PI*2);
          ctx.fillStyle = `rgba(255, 220, 240, ${0.2+flicker*0.2})`;
          ctx.fill();
        }
        ctx.restore();
      }
      
      // show message when bloom completes (progress >= 1.0)
      if (p >= 0.999 && !bloomCompleted) {
        bloomCompleted = true;
        messageEl.classList.add('show');
      }
    }

    // ----- ANIMATION LOOP (requestAnimationFrame) -----
    function animationLoop(timestamp) {
      if (!animStart) animStart = timestamp;
      const elapsed = timestamp - animStart;
      let progress = elapsed / ANIM_DURATION;
      const finished = progress >= 1.0;
      if (finished) progress = 1.0;
      
      // update particle systems every frame
      updateParticles();
      
      // draw everything
      drawScene(progress);
      
      // continue animation if not finished OR we want to keep particles alive
      if (!finished || particles.length > 0) {
        animFrame = requestAnimationFrame(animationLoop);
      } else {
        // if finished and no particles, we can stop, but we still want hearts after bloom?
        // keep alive a bit longer for romantic effect (continue loop softly)
        if (particles.length === 0 && finished) {
          // occasional new sparkle even after bloom
          if (Math.random() < 0.2) spawnSparkle();
          animFrame = requestAnimationFrame(animationLoop);
        } else {
          animFrame = requestAnimationFrame(animationLoop);
        }
      }
      
      // safety: if bloom completed but message not shown (ensure)
      if (finished && !bloomCompleted) {
        bloomCompleted = true;
        messageEl.classList.add('show');
      }
    }

    // ----- start everything on page load -----
    function startRomanticBloom() {
      // initial spawn of some particles
      for (let i=0; i<6; i++) { spawnHeart(); spawnSparkle(); }
      animFrame = requestAnimationFrame(animationLoop);
    }

    // handle page visibility (optional: not needed but good)
    window.addEventListener('load', startRomanticBloom);
    
    // cleanup potential animation frame on page unload (good practice)
    window.addEventListener('beforeunload', () => {
      if (animFrame) cancelAnimationFrame(animFrame);
    });

    // resize does not affect canvas logical size, but CSS keeps it responsive
  })();
</script>
</body>
</html>
