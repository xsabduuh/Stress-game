<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>وردة رومانسية • لكِ 🌹</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #2b0b1f 0%, #5e2a46 40%, #a14d72 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* تأثير نجوم/لمعان خلفي خفيف */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(255, 220, 240, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(255, 200, 220, 0.1) 0%, transparent 45%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 5;
      max-width: 480px;
      width: 100%;
      background: rgba(25, 8, 20, 0.3);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 56px 56px 48px 48px;
      padding: 24px 20px 30px;
      box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 180, 200, 0.2) inset;
      border: 1px solid rgba(255, 200, 220, 0.15);
      transition: box-shadow 0.3s;
    }

    .canvas-wrapper {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 36px;
      background: rgba(15, 5, 12, 0.25);
      box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 210, 230, 0.1) inset;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: all 0.2s;
    }

    .message-container {
      text-align: center;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
    }

    .rose-message {
      font-size: 1.7rem;
      font-weight: 500;
      color: #ffecf0;
      text-shadow: 0 4px 12px #b3476b, 0 0 8px #ffb6c180;
      letter-spacing: 2px;
      word-break: keep-all;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 1.2s ease, transform 0.8s cubic-bezier(0.2, 0.9, 0.3, 1);
      background: linear-gradient(135deg, #ffe4ec, #ffd9e5);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: bold;
      line-height: 1.4;
    }

    .rose-message.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* حاوية القلوب الطافية */
    .hearts-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 20;
      overflow: hidden;
    }

    .floating-heart {
      position: absolute;
      color: #ff9ebb;
      font-size: 24px;
      opacity: 0;
      animation: floatUpHeart 5s ease-out forwards;
      filter: drop-shadow(0 0 6px #ffb6d9);
      user-select: none;
      pointer-events: none;
      z-index: 25;
    }

    @keyframes floatUpHeart {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.5) rotate(0deg);
      }
      15% {
        opacity: 0.9;
      }
      80% {
        opacity: 0.7;
      }
      100% {
        opacity: 0;
        transform: translateY(-280px) scale(1.3) rotate(15deg);
      }
    }

    /* توقيع صغير */
    .hint {
      text-align: center;
      margin-top: 6px;
      color: #f0cdda;
      opacity: 0.65;
      font-size: 0.8rem;
      letter-spacing: 2px;
    }

    /* زر إعادة خفي للرومانسية (اختياري) — فقط للنعومة */
    .replay-touch {
      display: inline-block;
      margin-top: 6px;
      color: #ffdae6;
      background: none;
      border: none;
      font-size: 0.9rem;
      opacity: 0.5;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 40px;
      backdrop-filter: blur(5px);
      transition: opacity 0.2s;
    }
    .replay-touch:hover {
      opacity: 0.9;
      background: rgba(255, 200, 220, 0.1);
    }
  </style>
</head>
<body>
  <!-- طبقة القلوب الطائرة -->
  <div class="hearts-layer" id="heartsLayer"></div>

  <div class="card">
    <div class="canvas-wrapper">
      <canvas id="roseCanvas"></canvas>
    </div>
    <div class="message-container">
      <div class="rose-message" id="loveMessage">هذه الوردة لكِ ❤️</div>
    </div>
    <div class="hint">✨ تنمو من القلب ✨</div>
    <!-- خيار لمسي لإعادة المشهد (اختياري لكن لطيف) -->
    <div style="text-align: center;">
      <button class="replay-touch" id="replayBtn" aria-label="شاهد النمو مجدداً">⟳ أعد الإزهار</button>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      // ---------- العناصر ----------
      const canvas = document.getElementById('roseCanvas');
      const ctx = canvas.getContext('2d');
      const messageEl = document.getElementById('loveMessage');
      const heartsLayer = document.getElementById('heartsLayer');

      // ---------- متغيرات التحكم ----------
      let animationProgress = 0;           // 0 .. 1
      let animFrame = null;
      let animStartTime = null;
      const ANIMATION_DURATION = 4800;     // 4.8 ثانية (بين 3-6)
      let isAnimating = false;
      let animationCompleted = false;

      // أبعاد canvas الفعلية (تحدد عند تغيير الحجم)
      let canvasWidth = 400;
      let canvasHeight = 500;

      // للتحكم بتوليد القلوب
      let heartInterval = null;
      let heartsGenerated = false;

      // ---------- ضبط حجم canvas (متجاوب) ----------
      function resizeCanvas() {
        const container = canvas.parentElement;
        const containerWidth = container.clientWidth;
        // نسبة عرض إلى ارتفاع 4:5 (منظر عمودي جميل)
        const aspectRatio = 5 / 4;  // height = width * 1.25
        let newWidth = Math.min(containerWidth, 480); // حد أقصى للعرض 480px
        let newHeight = newWidth * aspectRatio;

        // لا نريد أن يتجاوز ارتفاع الشاشة كثيراً
        const maxHeight = window.innerHeight * 0.6;
        if (newHeight > maxHeight) {
          newHeight = maxHeight;
          newWidth = newHeight / aspectRatio;
        }

        canvasWidth = Math.floor(newWidth);
        canvasHeight = Math.floor(newHeight);

        canvas.width = canvasWidth;
        canvas.height = canvasHeight;

        // إعادة رسم المشهد حسب التقدم الحالي
        drawFullScene(animationProgress);
      }

      // ---------- رسم المشهد بالكامل (حسب التقدم) ----------
      function drawFullScene(progress) {
        if (!canvasWidth || !canvasHeight) return;
        
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        
        // رسم تأثير خلفية شفافة داخلية بسيطة (إطار ناعم)
        const gradient = ctx.createRadialGradient(
          canvasWidth/2, canvasHeight/2, 5,
          canvasWidth/2, canvasHeight/2, canvasWidth*0.7
        );
        gradient.addColorStop(0, 'rgba(70, 20, 40, 0.2)');
        gradient.addColorStop(1, 'rgba(20, 5, 15, 0.1)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);

        // رسم الوعاء / الأرضية (يكون ظاهراً دائماً)
        drawPot(ctx, canvasWidth, canvasHeight);
        
        // إذا لم يبدأ النمو بعد (progress = 0) لا نرسم شيئاً آخر
        if (progress <= 0) return;

        // إحداثيات مهمة (نسب مئوية)
        const potTopY = canvasHeight * 0.80;      // أعلى الوعاء
        const roseCenterX = canvasWidth / 2;
        const roseCenterY = canvasHeight * 0.38;   // مركز الوردة

        // 1. رسم الساق (ينمو حسب التقدم)
        drawStem(ctx, progress, roseCenterX, potTopY, roseCenterY, canvasWidth, canvasHeight);

        // 2. رسم الأوراق (تظهر بعد 30% من النمو)
        if (progress >= 0.28) {
          const leafProgress = Math.min(1, (progress - 0.28) / 0.25); // تظهر تدريجياً
          drawLeaves(ctx, leafProgress, roseCenterX, potTopY, roseCenterY, canvasWidth);
        }

        // 3. رسم الوردة (تبدأ بالتفتح من 48% إلى 100%)
        if (progress >= 0.48) {
          const bloomProgress = Math.min(1, (progress - 0.48) / 0.52); // 0..1 للتفتح
          drawRose(ctx, bloomProgress, roseCenterX, roseCenterY, canvasWidth, canvasHeight);
        }

        // إضافة لمعان خفيف / نجوم صغيرة عشوائية (تأثير ساحر)
        if (progress > 0.6) {
          drawSparkles(ctx, progress, roseCenterX, roseCenterY, canvasWidth, canvasHeight);
        }
      }

      // ---------- رسم الوعاء (وعاء صغير أنيق) ----------
      function drawPot(ctx, w, h) {
        const potWidth = w * 0.36;
        const potHeight = h * 0.14;
        const potX = (w - potWidth) / 2;
        const potY = h * 0.82;  // قاع الوعاء
        
        // ظل خفيف تحت الوعاء
        ctx.shadowColor = '#2d0e1e';
        ctx.shadowBlur = 14;
        ctx.shadowOffsetY = 4;
        
        // جسم الوعاء (شبه منحرف)
        ctx.beginPath();
        ctx.moveTo(potX + potWidth * 0.2, potY);
        ctx.lineTo(potX + potWidth * 0.8, potY);
        ctx.lineTo(potX + potWidth * 0.95, potY + potHeight);
        ctx.lineTo(potX + potWidth * 0.05, potY + potHeight);
        ctx.closePath();
        
        const potGrad = ctx.createLinearGradient(potX, potY, potX + potWidth*0.3, potY + potHeight);
        potGrad.addColorStop(0, '#9f6b7c');
        potGrad.addColorStop(0.7, '#5d3345');
        ctx.fillStyle = potGrad;
        ctx.fill();
        
        // حافة الوعاء
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.ellipse(potX + potWidth/2, potY, potWidth*0.45, potHeight*0.25, 0, 0, Math.PI*2);
        ctx.fillStyle = '#b3808f';
        ctx.fill();
        ctx.strokeStyle = '#ecc0cf';
        ctx.lineWidth = 1.2;
        ctx.stroke();
        
        // تراب / أرض داخل الوعاء
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.ellipse(potX + potWidth/2, potY-1, potWidth*0.35, potHeight*0.14, 0, 0, Math.PI*2);
        ctx.fillStyle = '#5d3f47';
        ctx.fill();
        
        // إعادة ضبط الظل
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;
      }

      // ---------- رسم الساق (ينمو تدريجياً) ----------
      function drawStem(ctx, progress, startX, startY, endX, endY, w, h) {
        // نمو الساق: من الأسفل للأعلى
        const currentEndY = startY - (startY - endY) * Math.min(progress * 1.2, 1.0);
        
        // منحنى خفيف
        const cp1x = startX - w * 0.02;
        const cp1y = startY - (startY - endY) * 0.4;
        const cp2x = endX + w * 0.03;
        const cp2y = startY - (startY - endY) * 0.7;
        
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endX, currentEndY);
        
        ctx.lineWidth = Math.max(5, w * 0.03);
        ctx.strokeStyle = '#3b6b3b';
        ctx.shadowColor = '#1f3a1f';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetX = 1;
        ctx.lineCap = 'round';
        ctx.stroke();
        
        // خط ثانوي لإضاءة خفيفة
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endX, currentEndY);
        ctx.lineWidth = Math.max(2, w*0.012);
        ctx.strokeStyle = '#6f9e6f';
        ctx.shadowBlur = 6;
        ctx.stroke();
        
        ctx.shadowColor = 'transparent';
      }

      // ---------- رسم الأوراق (تظهر واحدة تلو الأخرى) ----------
      function drawLeaves(ctx, leafProgress, stemX, stemBottomY, roseY, w) {
        // ورقتان: اليسرى واليمنى
        const leafY1 = stemBottomY - (stemBottomY - roseY) * 0.55;
        const leafY2 = stemBottomY - (stemBottomY - roseY) * 0.75;
        
        // ظهور تدريجي: الأولى ثم الثانية
        const leftLeafAlpha = Math.min(1, leafProgress * 1.8);
        const rightLeafAlpha = Math.min(1, Math.max(0, (leafProgress - 0.25) * 2.2));
        
        ctx.shadowColor = '#1e3b1e';
        ctx.shadowBlur = 10;
        
        // ورقة يسرى
        if (leftLeafAlpha > 0.01) {
          ctx.save();
          ctx.translate(stemX - w*0.12, leafY1);
          ctx.rotate(-0.4);
          ctx.scale(1, 0.9);
          ctx.beginPath();
          ctx.ellipse(0, 0, w*0.12, w*0.05, 0, 0, Math.PI*2);
          const grad = ctx.createLinearGradient(-w*0.06, -w*0.03, w*0.06, w*0.02);
          grad.addColorStop(0, '#4f8a4f');
          grad.addColorStop(1, '#2d5a2d');
          ctx.fillStyle = grad;
          ctx.globalAlpha = leftLeafAlpha;
          ctx.fill();
          ctx.strokeStyle = '#1d3a1d';
          ctx.lineWidth = 1.2;
          ctx.stroke();
          ctx.restore();
        }
        
        // ورقة يمنى
        if (rightLeafAlpha > 0.01) {
          ctx.save();
          ctx.translate(stemX + w*0.12, leafY2);
          ctx.rotate(0.45);
          ctx.scale(1, 0.9);
          ctx.beginPath();
          ctx.ellipse(0, 0, w*0.13, w*0.055, 0, 0, Math.PI*2);
          const grad = ctx.createLinearGradient(-w*0.05, -w*0.02, w*0.07, w*0.03);
          grad.addColorStop(0, '#5f9e5f');
          grad.addColorStop(1, '#2a522a');
          ctx.fillStyle = grad;
          ctx.globalAlpha = rightLeafAlpha;
          ctx.fill();
          ctx.strokeStyle = '#1d3a1d';
          ctx.stroke();
          ctx.restore();
        }
        
        ctx.globalAlpha = 1.0;
        ctx.shadowColor = 'transparent';
      }

      // ---------- رسم الوردة المتفتحة (رومانسية ناعمة) ----------
      function drawRose(ctx, bloom, centerX, centerY, w, h) {
        // كلما زاد bloom تتفتح البتلات أكثر (حجم وانتشار)
        const baseSize = w * 0.18;
        const petalCount = 7;
        
        ctx.shadowColor = '#b34e6b';
        ctx.shadowBlur = 20;
        
        // رسم البتلات الخلفية أولاً
        for (let i = 0; i < petalCount; i++) {
          const angle = (i / petalCount) * Math.PI * 2 + bloom * 0.5;
          const distance = baseSize * 0.45 * bloom;  // كلما تفتحت ابتعدت قليلاً
          const offsetX = Math.cos(angle) * distance;
          const offsetY = Math.sin(angle) * distance * 0.7;
          
          const petalWidth = baseSize * (0.55 + bloom * 0.35);
          const petalHeight = baseSize * (0.8 + bloom * 0.4);
          
          ctx.save();
          ctx.translate(centerX + offsetX, centerY + offsetY - 2);
          ctx.rotate(angle + 0.2);
          ctx.scale(1, 0.9);
          
          // تدرج لوني للبتلة
          const gradient = ctx.createRadialGradient(
            -petalWidth*0.2, -petalHeight*0.1, 2,
            petalWidth*0.3, petalHeight*0.2, petalWidth*0.9
          );
          gradient.addColorStop(0, '#ffb0c3');
          gradient.addColorStop(0.5, '#e8668a');
          gradient.addColorStop(1, '#b3405f');
          
          ctx.beginPath();
          ctx.ellipse(0, 0, petalWidth, petalHeight, 0, 0, Math.PI*2);
          ctx.fillStyle = gradient;
          ctx.globalAlpha = 0.85 + bloom * 0.15;
          ctx.fill();
          ctx.strokeStyle = '#a1304f';
          ctx.lineWidth = 0.8;
          ctx.stroke();
          ctx.restore();
        }
        
        // بتلات أمامية (أكثر إشراقاً)
        for (let i = 0; i < 5; i++) {
          const angle = (i / 5) * Math.PI * 2 + 0.8;
          const distance = baseSize * 0.2 * bloom;
          const offsetX = Math.cos(angle) * distance;
          const offsetY = Math.sin(angle) * distance * 0.6;
          
          const petalWidth = baseSize * (0.5 + bloom * 0.3);
          const petalHeight = baseSize * (0.7 + bloom * 0.3);
          
          ctx.save();
          ctx.translate(centerX + offsetX, centerY + offsetY - 2);
          ctx.rotate(angle - 0.1);
          
          const grad = ctx.createRadialGradient(-5, -3, 2, 6, 4, petalWidth);
          grad.addColorStop(0, '#ffd0dc');
          grad.addColorStop(0.6, '#f2799e');
          grad.addColorStop(1, '#c94f6e');
          
          ctx.beginPath();
          ctx.ellipse(0, 0, petalWidth, petalHeight, 0, 0, Math.PI*2);
          ctx.fillStyle = grad;
          ctx.globalAlpha = 0.9;
          ctx.fill();
          ctx.strokeStyle = '#c24967';
          ctx.lineWidth = 0.9;
          ctx.stroke();
          ctx.restore();
        }
        
        // قلب الوردة (مركز متوهج)
        ctx.shadowBlur = 24;
        ctx.beginPath();
        ctx.arc(centerX, centerY-2, baseSize*0.2 * (0.5+bloom*0.5), 0, 2*Math.PI);
        const centerGrad = ctx.createRadialGradient(centerX-2, centerY-4, 1, centerX+2, centerY, baseSize*0.3);
        centerGrad.addColorStop(0, '#ffe5b4');
        centerGrad.addColorStop(1, '#d46b7c');
        ctx.fillStyle = centerGrad;
        ctx.fill();
        
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
      }

      // ---------- رسم لمعان / نجوم صغيرة (تأثير ساحر) ----------
      function drawSparkles(ctx, progress, centerX, centerY, w, h) {
        const sparkleCount = 5 + Math.floor(progress * 8);
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#ffbfd4';
        for (let i = 0; i < sparkleCount; i++) {
          const angle = (i * 1.8 + progress * 2) % (Math.PI*2);
          const radius = w * 0.22 * (0.6 + Math.sin(progress*5 + i)*0.2);
          const x = centerX + Math.cos(angle) * radius;
          const y = centerY + Math.sin(angle) * radius * 0.7 - 5;
          
          ctx.beginPath();
          ctx.arc(x, y, w*0.008 * (0.5+Math.sin(progress*8+i)*0.3), 0, 2*Math.PI);
          ctx.fillStyle = `rgba(255, 240, 200, ${0.5+Math.sin(progress*6+i)*0.3})`;
          ctx.fill();
        }
        ctx.shadowColor = 'transparent';
      }

      // ---------- دورة الأنيميشن ----------
      function animationStep(timestamp) {
        if (!animStartTime) {
          animStartTime = timestamp;
        }
        
        const elapsed = timestamp - animStartTime;
        let newProgress = Math.min(elapsed / ANIMATION_DURATION, 1.0);
        
        // استخدام دالة تهدئة (ease) لجعل النمو ناعماً
        // easeInOutCubic
        if (newProgress < 0.5) {
          newProgress = 2 * newProgress * newProgress;
        } else {
          newProgress = 1 - Math.pow(-2 * newProgress + 2, 2) / 2;
        }
        
        animationProgress = newProgress;
        drawFullScene(animationProgress);
        
        // إظهار الرسالة بعد الاكتمال (99% فأكثر)
        if (animationProgress >= 0.99 && !animationCompleted) {
          animationCompleted = true;
          messageEl.classList.add('show');
          // بدء توليد القلوب الطائرة بعد التفتح
          startFloatingHearts();
        }
        
        if (animationProgress < 1.0) {
          animFrame = requestAnimationFrame(animationStep);
        } else {
          // اكتمل الأنيميشن
          isAnimating = false;
          animFrame = null;
          animStartTime = null;
          // ضمان الرسم النهائي
          drawFullScene(1.0);
          if (!animationCompleted) {
            animationCompleted = true;
            messageEl.classList.add('show');
            startFloatingHearts();
          }
        }
      }

      // ---------- بدء الأنيميشن ----------
      function startAnimation() {
        // إيقاف أي أنيميشن سابق
        if (animFrame) {
          cancelAnimationFrame(animFrame);
          animFrame = null;
        }
        // إخفاء الرسالة مؤقتاً وإعادة ضبط المتغيرات
        messageEl.classList.remove('show');
        animationCompleted = false;
        animationProgress = 0;
        animStartTime = null;
        isAnimating = true;
        
        // إيقاف القلوب القديمة (إن وجدت)
        stopHearts();
        heartsGenerated = false;
        
        drawFullScene(0);
        animFrame = requestAnimationFrame(animationStep);
      }

      // ---------- نظام القلوب الطائرة (تأثير رومانسي) ----------
      function startFloatingHearts() {
        if (heartsGenerated) return;
        heartsGenerated = true;
        
        // تنظيف القلوب القديمة
        heartsLayer.innerHTML = '';
        
        // إنشاء قلب كل 400ms تقريباً
        heartInterval = setInterval(() => {
          createHeart();
        }, 380);
        
        // توليد بعض القلوب فوراً
        for (let i = 0; i < 4; i++) {
          setTimeout(() => createHeart(), i * 120);
        }
        
        // إيقاف بعد 8 ثواني (حتى لا تتراكم)
        setTimeout(() => {
          if (heartInterval) clearInterval(heartInterval);
          heartInterval = null;
        }, 7500);
      }
      
      function stopHearts() {
        if (heartInterval) {
          clearInterval(heartInterval);
          heartInterval = null;
        }
        heartsLayer.innerHTML = '';
      }
      
      function createHeart() {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerHTML = '❤️';
        
        const leftPos = 10 + Math.random() * 80; // % من العرض
        const size = 18 + Math.floor(Math.random() * 22);
        heart.style.left = leftPos + '%';
        heart.style.bottom = '5%';
        heart.style.fontSize = size + 'px';
        heart.style.animationDuration = (4.2 + Math.random() * 3) + 's';
        heart.style.opacity = '0';
        
        heartsLayer.appendChild(heart);
        
        // إزالة العنصر بعد انتهاء الأنيميشن
        setTimeout(() => {
          if (heart.parentNode) heart.remove();
        }, 7000);
      }

      // ---------- إعادة التشغيل (زر) ----------
      function replayAnimation() {
        stopHearts();
        heartsGenerated = false;
        startAnimation();
      }

      // ---------- تهيئة الصفحة والاستجابة ----------
      function init() {
        resizeCanvas();
        // بدء الأنيميشن تلقائياً بعد تحميل الصفحة
        startAnimation();
        
        window.addEventListener('resize', () => {
          resizeCanvas();
          // إعادة رسم بالمشهد الحالي (لا نعيد تشغيل الأنيميشن)
          drawFullScene(animationProgress);
        });
        
        document.getElementById('replayBtn').addEventListener('click', (e) => {
          e.preventDefault();
          replayAnimation();
        });
      }

      // بدء كل شيء عند تحميل الصفحة
      window.addEventListener('load', init);
      
      // في حال حدث تغيير حجم قبل load
      if (document.readyState === 'complete') {
        init();
      } else {
        window.addEventListener('load', init);
      }
    })();
  </script>
</body>
</html>
